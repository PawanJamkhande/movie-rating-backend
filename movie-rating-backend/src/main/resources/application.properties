# =========================================
# Server
# Render (and most hosts) inject a PORT env var your app MUST bind to.
# Falls back to 9091 for local development.
# =========================================
server.port=${PORT:9091}

# =========================================
# MySQL Database Connection
# Reads from environment variables in production (set these on Render).
# Falls back to your local MySQL for everyday local development, so
# nothing changes about how you run this on your own machine.
# createDatabaseIfNotExist=true -> creates the schema itself, no manual step needed
# =========================================
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/movie_rating_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================
# JPA / Hibernate
# ddl-auto=update -> Hibernate creates/updates all tables automatically
# based on the @Entity classes. No manual SQL/table creation needed.
# =========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# =========================================
# Session (used for login state, same as library project)
# =========================================
server.servlet.session.timeout=30m

# =========================================
# Jackson - don't fail if the frontend sends extra fields
# (e.g. posting a full Movie object with movieId/averageRating back to an
# endpoint that only expects a MovieRequest shape)
# =========================================
spring.jackson.deserialization.fail-on-unknown-properties=false

